name: Release Verification

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  web:
    name: Web, Assets, Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Maigret CLI
        run: python -m pip install maigret

      - name: Verify Maigret scanner runtime
        run: SCAN_PROVIDER=maigret npm run scan:maigret

      - name: Generate store assets
        run: npm run assets:store

      - name: Verify store assets
        run: npm run assets:verify

      - name: Verify store submission package
        run: npm run store:verify

      - name: Verify Docker Compose deployment package
        run: npm run deploy:verify

      - name: Verify web app
        run: npm run verify

      - name: Code hygiene
        run: npm run code:hygiene

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke tests
        run: npm run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Security audit
        run: npm run security:audit

      - name: Secret scan
        run: npm run security:secrets

  android:
    name: Android Native Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Install Android SDK packages
        run: yes | sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Configure release-domain placeholder for CI build
        run: |
          MOBILE_APP_ORIGIN="https://example.com" npm run mobile:configure
          MOBILE_RELEASE_CHECK=true npm run mobile:verify

      - name: Generate native icons and sync Capacitor
        run: |
          npm run assets:store
          npm run mobile:icons
          npm run mobile:sync

      - name: Build Android debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Build Android release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload Android debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Android release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

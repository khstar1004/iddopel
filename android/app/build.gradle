import java.util.Base64

apply plugin: 'com.android.application'

def envOrProperty = { name ->
    def envValue = System.getenv(name)
    if (envValue != null && envValue.trim()) {
        return envValue.trim()
    }
    if (project.hasProperty(name)) {
        def propValue = project.property(name)?.toString()
        if (propValue != null && propValue.trim()) {
            return propValue.trim()
        }
    }
    return null
}

def uploadKeystorePath = envOrProperty("GOOGLE_PLAY_UPLOAD_KEYSTORE_PATH")
def uploadKeystoreBase64 = envOrProperty("GOOGLE_PLAY_UPLOAD_KEYSTORE_BASE64")
if (!uploadKeystorePath && uploadKeystoreBase64) {
    def generatedSigningDir = new File(rootProject.buildDir, "generated-signing")
    generatedSigningDir.mkdirs()
    def generatedKeystore = new File(generatedSigningDir, "google-play-upload-key.jks")
    generatedKeystore.bytes = Base64.getDecoder().decode(uploadKeystoreBase64)
    uploadKeystorePath = generatedKeystore.absolutePath
}

def uploadKeystorePassword = envOrProperty("GOOGLE_PLAY_UPLOAD_KEYSTORE_PASSWORD")
def uploadKeyAlias = envOrProperty("GOOGLE_PLAY_UPLOAD_KEY_ALIAS")
def uploadKeyPassword = envOrProperty("GOOGLE_PLAY_UPLOAD_KEY_PASSWORD")
def uploadSigningReady = uploadKeystorePath && uploadKeystorePassword && uploadKeyAlias && uploadKeyPassword

android {
    namespace = "com.iddoppelganger.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.iddoppelganger.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        releaseUpload {
            if (uploadSigningReady) {
                storeFile file(uploadKeystorePath)
                storePassword uploadKeystorePassword
                keyAlias uploadKeyAlias
                keyPassword uploadKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (uploadSigningReady) {
                signingConfig signingConfigs.releaseUpload
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.android.billingclient:billing:9.0.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
